<div class="accueil-wrapper">
  
  <section class="hero-banner">
    <div class="hero-bg">
      <img [src]="hero.bgImage" alt="Hero Background">
      <div class="overlay"></div>
    </div>

    <div class="hero-content">
      <p class="top-label">{{ hero.category }}</p>
      <h1 class="main-title">{{ hero.title }}</h1>
      <p class="description">{{ hero.description }}</p>
      
      <div class="tag-list">
        @for (tag of hero.tags; track tag) {
          <span class="tag-item">{{ tag }}</span>
        }
      </div>

      <div class="actions">
        <button mat-flat-button class="btn-play">
          <mat-icon>play_arrow</mat-icon>
          Regarder maintenant
        </button>
      </div>
    </div>
  </section>

  <main class="main-content">
    <h2 class="section-heading">Parcourir les Catégories</h2>
    
    <div class="category-scroll">
      @for (cat of categories(); track cat) {
        <button 
          class="cat-chip" 
          [class.active]="categorySelected() === cat"
          (click)="selectCategory(cat)">
          {{ cat }}
        </button>
      }
    </div>

    <div class="video-section">
      <h3 class="row-title">Recently Added</h3>
      <div class="horizontal-grid">
        @for (item of [1,2,3,4,5,6]; track item) {
          <div class="video-card">
            <div class="thumbnail">
              <img src="assets/thumb-sample.jpg" alt="Video">
              <div class="card-overlay">
                <mat-icon>play_circle_outline</mat-icon>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </main>

</div>
